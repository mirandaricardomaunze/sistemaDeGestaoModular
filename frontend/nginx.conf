worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip — fallback em runtime quando o cliente não suporta brotli.
    gzip on;
    gzip_static on;        # serve .gz pré-compilado pelo vite-plugin-compression2
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Brotli — só fica activo se o nginx for compilado com o módulo ngx_brotli.
    # As linhas abaixo são ignoradas em silêncio se o módulo não existir nesta build.
    # brotli on;
    # brotli_static on;    # serve .br pré-compilado pelo vite-plugin-compression2
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # SPA routing — index.html nunca em cache (precisa de revalidar para apanhar deploys novos).
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Assets com hash no nome (vite emite sempre `*-<hash>.{js,css}` em /assets/):
        # podem ser cacheados para sempre.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Fallback para outros estáticos (fontes, imagens, manifests).
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Disable access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}

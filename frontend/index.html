<!doctype html>
<html lang="pt-MZ">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Multicore - Sistema de Gestão Empresarial</title>
  <meta name="description"
    content="Multicore - Sistema de gestão empresarial multifuncional para hotéis, lojas, farmácias, supermercados e logística" />

  <!-- PWA Meta Tags -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Multicore" />
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

  <!-- Service Worker Registration & Auto-Cleanup in Dev -->
  <script>
    // Force cache CLEAR on every reload in localhost to prevent ERR_CACHE_READ_FAILURE
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.port === '3000') {
      window.addEventListener('load', () => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            for (let registration of registrations) {
              registration.unregister().then(() => {
                console.log('🛠️ Service Worker unregistered (Dev Mode)');
              });
            }
          });
        }

        if ('caches' in window) {
          caches.keys().then(function (names) {
            for (let name of names) {
              caches.delete(name).then(() => {
                console.log('🛠️ Cache Storage cleared:', name);
              });
            }
          });
        }

        // Also clear local/session storage if it was a deep failure
        if (performance.navigation.type === 1) { // Reload
          console.log('🔄 Reload detected, ensuring fresh state...');
        }
      });
    }
  </script>

</body>

</html>
